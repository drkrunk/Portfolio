<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Rodey Parcel Tracker</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app {
            width: 1200px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .18);
            overflow: hidden;
        }

        header {
            background: #1f2f46;
            color: white;
            padding: 18px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }

        .startPanel {
            padding: 40px;
            text-align: center;
        }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 6px;
            background: #1e73d8;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #155ab5;
        }

        .tabs {
            display: flex;
            background: #f3f4f7;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            padding: 12px 22px;
            cursor: pointer;
        }

        .tab.active {
            background: white;
            font-weight: 600;
            border-bottom: 2px solid #1e73d8;
        }

        .panel {
            display: none;
            padding: 22px;
        }

        .panel.active {
            display: block;
        }

        .entryRow {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .entryRow input,
        .entryRow select {
            padding: 9px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .entryRow select {
            background: white;
            min-width: 180px;
        }

        .status {
            margin-top: 10px;
            color: #555;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #e4e4e4;
            text-align: left;
        }

        th {
            background: #f7f7f7;
            cursor: pointer;
            user-select: none;
        }

        th span {
            margin-left: 5px;
            font-size: 12px;
        }

        tr:hover {
            background: #f8fbff;
        }

        /* Pencil edit icon */
        .edit-icon {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            color: #1e73d8;
            width: 24px;
            height: 24px;
            user-select: none;
            transition: color 0.2s;
        }

        .edit-icon:hover {
            color: #155ab5;
        }

        /* Small delete X */
        .delete-x {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            color: #888;
            transition: color 0.2s;
            width: 24px;
            height: 24px;
            user-select: none;
        }

        .delete-x:hover {
            color: #c00;
            font-weight: bold;
        }

        .editing input,
        .editing select {
            width: 90%;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="app">

        <header>Rodey Parcel Tracker</header>

        <div id="startPanel" class="startPanel">
            <button onclick="openCSV()">Load CSV File</button>
            <div class="status" id="status">
                Please load the parcel tracking CSV file.
            </div>
        </div>

        <div id="trackerUI" class="hidden">

            <div class="tabs">
                <div class="tab active" onclick="showTab(0)">Entry</div>
                <div class="tab" onclick="showTab(1)">View Data</div>
            </div>

            <div class="panel active">
                <div class="entryRow">
                    <input id="initials" placeholder="Requester Initials" style="width:160px">
                    <input id="barcode" placeholder="Scan Barcode" style="flex:1; min-width:200px;">
                    <select id="carrierSelect"></select>
                    <button onclick="addEntry()">Add Entry</button>
                </div>
                <div class="status" id="fileStatus"></div>
            </div>

            <div class="panel">
                <table id="table">
                    <thead>
                        <tr>
                            <th onclick="sortData(0)">Requester <span id="sort0"></span></th>
                            <th onclick="sortData(1)">Barcode <span id="sort1"></span></th>
                            <th onclick="sortData(2)">Date <span id="sort2"></span></th>
                            <th onclick="sortData(3)">Time <span id="sort3"></span></th>
                            <th onclick="sortData(4)">Carrier <span id="sort4"></span></th>
                            <th></th> <!-- Actions column for edit + delete -->
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>

    </div>

    <script>
        let fileHandle = null;
        let data = [];
        const HEADER = "Requester,Barcode,Date,Time,Carrier";

        // Sorting state
        let sortColumn = 0;
        let sortDirection = 1;

        // ---------- Carrier dropdown options ----------
        const carrierGroups = [
            {
                label: "UPS",
                options: [
                    "UPS Ground",
                    "UPS 3 Day Select",
                    "UPS 2nd Day Air",
                    "UPS Next Day Air",
                    "UPS Next Day Air Saver",
                    "UPS Next Day Air Early"
                ]
            },
            {
                label: "USPS",
                options: [
                    "USPS Ground Advantage",
                    "USPS Priority Mail",
                    "USPS Priority Mail Express",
                    "USPS Media Mail",
                    "USPS Certified Mail"
                ]
            },
            {
                label: "FedEx",
                options: [
                    "FedEx Ground",
                    "FedEx Home Delivery",
                    "FedEx Express Saver",
                    "FedEx 2Day",
                    "FedEx Priority Overnight",
                    "FedEx Standard Overnight",
                    "FedEx First Overnight"
                ]
            },
            {
                label: "Other",
                options: ["Other"]
            }
        ];

        function getCarrierOptionsHTML(selectedValue = "") {
            let html = "";
            for (let group of carrierGroups) {
                html += `<optgroup label="${group.label}">`;
                for (let opt of group.options) {
                    let selected = (opt === selectedValue) ? "selected" : "";
                    html += `<option value="${opt}" ${selected}>${opt}</option>`;
                }
                html += `</optgroup>`;
            }
            return html;
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("carrierSelect").innerHTML = getCarrierOptionsHTML();
        });

        function showTab(i) {
            document.querySelectorAll(".tab").forEach((t, idx) => {
                t.classList.toggle("active", idx === i);
            });
            document.querySelectorAll(".panel").forEach((p, idx) => {
                p.classList.toggle("active", idx === i);
            });
            if (i === 1) renderTable();
        }

        function getCurrentDate() {
            return new Date().toLocaleDateString();
        }

        function getCurrentTime() {
            return new Date().toLocaleTimeString();
        }

        function updateSortIndicators() {
            for (let i = 0; i < 5; i++) {
                let span = document.getElementById(`sort${i}`);
                if (i === sortColumn) {
                    span.textContent = sortDirection === 1 ? '▲' : '▼';
                } else {
                    span.textContent = '';
                }
            }
        }

        function sortData(col) {
            if (col === sortColumn) {
                sortDirection *= -1;
            } else {
                sortColumn = col;
                sortDirection = 1;
            }

            data.sort((a, b) => {
                let valA = a[col] || "";
                let valB = b[col] || "";
                return sortDirection * valA.localeCompare(valB);
            });

            renderTable();
        }

        function renderTable() {
            let tbody = document.querySelector("#table tbody");
            tbody.innerHTML = "";

            for (let i = 0; i < data.length; i++) {
                let row = data[i];
                let tr = document.createElement("tr");
                tr.dataset.index = i;

                // Double-click to edit (ignores icons)
                tr.ondblclick = (e) => {
                    if (e.target.classList.contains('edit-icon') || e.target.classList.contains('delete-x')) return;
                    enableEditMode(tr, i);
                };

                for (let j = 0; j < 5; j++) {
                    let td = document.createElement("td");
                    td.textContent = row[j] || "";
                    td.dataset.col = j;
                    tr.appendChild(td);
                }

                // Actions cell: pencil icon + delete X
                let tdActions = document.createElement("td");
                tdActions.style.textAlign = "right";

                // Pencil edit icon
                let pencil = document.createElement("span");
                pencil.className = "edit-icon";
                pencil.textContent = "✎";
                pencil.onclick = (e) => {
                    e.stopPropagation();
                    enableEditMode(tr, i);
                };
                tdActions.appendChild(pencil);

                // Delete X
                let delX = document.createElement("span");
                delX.className = "delete-x";
                delX.textContent = "✕";
                delX.onclick = (e) => {
                    e.stopPropagation();
                    deleteRow(i);
                };
                tdActions.appendChild(delX);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            }

            updateSortIndicators();
            document.getElementById("fileStatus").innerHTML =
                `Connected to file: ${fileHandle ? fileHandle.name : 'unknown'} (${data.length} records)`;
        }

        // Delete a row after confirmation – no re-sort
        function deleteRow(index) {
            if (confirm("Are you sure you want to delete this row?")) {
                data.splice(index, 1);
                renderTable(); // re-render to reflect deletion
                writeFile();
            }
        }

        function enableEditMode(tr, rowIndex) {
            if (tr.classList.contains('editing')) return;

            const row = data[rowIndex];
            const cells = tr.querySelectorAll('td');

            // Replace Requester (0) and Barcode (1) with input fields
            for (let col of [0, 1]) {
                let td = cells[col];
                let currentVal = row[col] || "";
                let input = document.createElement('input');
                input.type = 'text';
                input.value = currentVal;
                input.style.width = '90%';
                td.innerHTML = '';
                td.appendChild(input);
            }

            // Replace Carrier (4) with dropdown
            let carrierTd = cells[4];
            let currentCarrier = row[4] || "";
            let select = document.createElement('select');
            select.style.width = '95%';
            select.innerHTML = getCarrierOptionsHTML(currentCarrier);
            carrierTd.innerHTML = '';
            carrierTd.appendChild(select);

            // Actions cell (index 5) becomes save + cancel icons
            let actionsCell = cells[5];
            actionsCell.innerHTML = '';
            actionsCell.style.textAlign = 'center';

            let saveIcon = document.createElement('span');
            saveIcon.className = 'save-icon';
            saveIcon.textContent = '✔';
            saveIcon.style.marginRight = '8px';
            saveIcon.style.cursor = 'pointer';
            saveIcon.style.color = '#1e73d8';
            saveIcon.onclick = (e) => {
                e.stopPropagation();
                saveEdit(tr, rowIndex);
            };

            let cancelIcon = document.createElement('span');
            cancelIcon.className = 'edit-icon';
            cancelIcon.textContent = '✖';
            cancelIcon.style.cursor = 'pointer';
            cancelIcon.style.color = '#1e73d8';
            cancelIcon.onclick = (e) => {
                e.stopPropagation();
                cancelEdit(tr, rowIndex);
            };

            actionsCell.appendChild(saveIcon);
            actionsCell.appendChild(cancelIcon);

            // Pressing Enter in any input saves
            const inputs = tr.querySelectorAll('td input, td select');
            inputs.forEach(inp => {
                inp.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        saveEdit(tr, rowIndex);
                    }
                });
            });

            tr.classList.add('editing');
            setTimeout(() => inputs[0].focus(), 50);
        }

        // Save only this row and exit its edit mode
        function saveEdit(tr, rowIndex) {
            const inputs = tr.querySelectorAll('td input');
            const selects = tr.querySelectorAll('td select');
            if (inputs.length !== 2 || selects.length !== 1) return;

            const newRequester = inputs[0].value.trim();
            const newBarcode = inputs[1].value.trim();
            const newCarrier = selects[0].value;

            if (!newRequester || !newBarcode) {
                alert("Requester and Barcode cannot be empty.");
                return;
            }

            // Update data array for this row
            data[rowIndex][0] = newRequester;
            data[rowIndex][1] = newBarcode;
            data[rowIndex][4] = newCarrier;

            // Convert this row back to static display
            revertRowToStatic(tr, rowIndex);

            // Write to file
            writeFile();
        }

        // Cancel editing for this row only
        function cancelEdit(tr, rowIndex) {
            revertRowToStatic(tr, rowIndex);
        }

        // Helper: revert a single row from edit mode to static display
        function revertRowToStatic(tr, rowIndex) {
            const row = data[rowIndex];
            const cells = tr.querySelectorAll('td');

            // Restore static text for data columns (0-4)
            for (let col = 0; col < 5; col++) {
                let td = cells[col];
                td.textContent = row[col] || "";
            }

            // Restore actions cell with pencil and delete X
            let actionsCell = cells[5];
            actionsCell.innerHTML = '';
            actionsCell.style.textAlign = 'right';

            // Pencil
            let pencil = document.createElement('span');
            pencil.className = 'edit-icon';
            pencil.textContent = '✎';
            pencil.onclick = (e) => {
                e.stopPropagation();
                enableEditMode(tr, rowIndex);
            };
            actionsCell.appendChild(pencil);

            // Delete X
            let delX = document.createElement('span');
            delX.className = 'delete-x';
            delX.textContent = '✕';
            delX.onclick = (e) => {
                e.stopPropagation();
                deleteRow(rowIndex);
            };
            actionsCell.appendChild(delX);

            tr.classList.remove('editing');
        }

        function csvText() {
            let rows = [HEADER];
            for (let r of data) {
                while (r.length < 5) r.push("");
                rows.push(r.join(","));
            }
            return rows.join("\n");
        }

        function parseCSV(text) {
            data = [];
            let lines = text.trim().split("\n");
            for (let i = 1; i < lines.length; i++) {
                let row = lines[i].split(",");
                if (row.length === 4) {
                    data.push([row[0], row[1], row[2], row[3], ""]);
                } else if (row.length >= 5) {
                    data.push([row[0], row[1], row[2], row[3], row[4] || ""]);
                }
            }
            // Initial sort by Requester ascending on load
            sortColumn = 0;
            sortDirection = 1;
            data.sort((a, b) => (a[0] || "").localeCompare(b[0] || ""));
            renderTable();
        }

        async function writeFile() {
            if (!fileHandle) return;
            const writable = await fileHandle.createWritable();
            await writable.write(csvText());
            await writable.close();
        }

        async function addEntry() {
            let requester = document.getElementById("initials").value.trim();
            let barcode = document.getElementById("barcode").value.trim();
            let carrier = document.getElementById("carrierSelect").value;

            if (!requester || !barcode) {
                alert("Enter requester initials and barcode");
                return;
            }

            data.push([requester, barcode, getCurrentDate(), getCurrentTime(), carrier]);

            renderTable(); // new row appears at the bottom
            await writeFile();

            document.getElementById("initials").value = "";
            document.getElementById("barcode").value = "";
            document.getElementById("initials").focus();
        }

        async function openCSV() {
            try {
                [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: "CSV File",
                        accept: { "text/csv": [".csv"] }
                    }]
                });

                const file = await fileHandle.getFile();
                const text = await file.text();
                parseCSV(text);

                document.getElementById("startPanel").style.display = "none";
                document.getElementById("trackerUI").classList.remove("hidden");

                document.getElementById("fileStatus").innerHTML =
                    `Connected to file: ${fileHandle.name} (${data.length} records)`;

                document.getElementById("initials").focus();
            } catch {
                document.getElementById("status").innerText =
                    "File selection cancelled. Please load the CSV file.";
            }
        }

        document.getElementById("barcode").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                addEntry();
            }
        });
    </script>

</body>

</html>
